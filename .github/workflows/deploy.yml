name: Deploy Portfolio

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Build site
        run: npm run build

      # QA-016: fail CI if the main JS chunk grows beyond budget (~291 KB raw / ~95 KB gzip today).
      - name: Check main bundle size budget
        run: |
          MAIN_JS=$(find dist/assets -name 'index-*.js' -type f | head -1)
          if [ -z "$MAIN_JS" ]; then
            echo "::error::Main JS chunk not found in dist/assets"
            exit 1
          fi
          RAW_MAX=320000
          GZIP_MAX=100000
          RAW_SIZE=$(wc -c < "$MAIN_JS" | tr -d ' ')
          GZIP_SIZE=$(gzip -c "$MAIN_JS" | wc -c | tr -d ' ')
          echo "Main bundle: ${RAW_SIZE} bytes raw (budget ${RAW_MAX})"
          echo "Main bundle: ${GZIP_SIZE} bytes gzip (budget ${GZIP_MAX})"
          if [ "$RAW_SIZE" -gt "$RAW_MAX" ]; then
            echo "::error::Main JS chunk exceeds raw budget (${RAW_SIZE} > ${RAW_MAX} bytes)"
            exit 1
          fi
          if [ "$GZIP_SIZE" -gt "$GZIP_MAX" ]; then
            echo "::error::Main JS chunk exceeds gzip budget (${GZIP_SIZE} > ${GZIP_MAX} bytes)"
            exit 1
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
